<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    // Background
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(1, '#e94560');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.15);
    ctx.fill();
    // Emoji
    ctx.font = `${size * 0.45}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F468}\u{200D}\u{1F469}\u{200D}\u{1F466}', size/2, size * 0.42);
    // Text
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${size * 0.1}px -apple-system, sans-serif`;
    ctx.fillText('FAMILIE', size/2, size * 0.78);
}
drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
// To save: right-click each canvas and "Save Image As"
</script>
<p>Right-click each canvas to save as PNG icon</p>
</body>
</html>
