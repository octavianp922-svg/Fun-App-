<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Povestiri de Familie">
    <meta name="theme-color" content="#1a1a2e">
    <title>Povestiri de Familie</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/novel.css">
    <link rel="stylesheet" href="css/transitions.css">
</head>
<body>
    <!-- Ecran: Meniu Principal -->
    <div id="screen-menu" class="screen active">
        <div class="menu-container">
            <h1 class="game-title">Povestiri de Familie</h1>
            <p class="game-subtitle">Un joc cu alegeri, haos si mult umor</p>
            <div class="episode-grid" id="episode-grid"></div>
        </div>
    </div>

    <!-- Ecran: Joc Visual Novel -->
    <div id="screen-game" class="screen">
        <div id="game-container">
            <div id="bg-layer"></div>
            <div id="bg-layer-next"></div>
            <div id="characters-layer">
                <div id="character-left" class="character-portrait"></div>
                <div id="character-right" class="character-portrait"></div>
            </div>
            <div id="dialogue-box">
                <div id="speaker-name"></div>
                <div id="dialogue-text"></div>
                <div id="tap-indicator">Apasa pentru a continua...</div>
                <div id="choices-container"></div>
            </div>
            <button id="btn-menu" class="btn-overlay" aria-label="Inapoi la meniu">&#9776;</button>
        </div>
    </div>

    <!-- Ecran: Final Episod -->
    <div id="screen-ending" class="screen">
        <div class="ending-container">
            <div id="ending-badge">&#127942;</div>
            <h2 id="ending-title"></h2>
            <p id="ending-description"></p>
            <div class="ending-buttons">
                <button id="btn-replay" class="btn-primary">Joaca din nou</button>
                <button id="btn-back-menu" class="btn-secondary">Inapoi la meniu</button>
            </div>
        </div>
    </div>

    <script src="js/characters.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/save.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
